<!-- partout/templates/partout/delete_car_form.html -->

{% extends 'partout/base.html' %}
{% load static %}

{% block sub_css %}
    <link rel="stylesheet" href="{% static 'partout/css/delete_car_form.css' %}">
{% endblock sub_css %}

{% block content %}

<h1 id="titleCPF">Delete Conversation</h1>

<div id="boxCPF">
    <div id="optionFormH3Box" >

        <h3 style="text-align: center; margin-bottom: 25px;">
            Are you sure you want to delete this conversation?
        </h3>
    </div>

    <div id="createPostSubCan">
        <form action="" method="post">
            {% csrf_token %}
            <input type="submit" value="Delete" id="submitButtonCPF">
        </form>

        <a href="{% url 'messages' %}" id="cancelButtonCPF">Cancel</a>
    </div>
</div>

{% endblock %}
