<!-- partout/templates/partout/add_car_form.html -->

{% extends 'partout/base.html' %}
{% load static %}

{% block sub_css %}
<link rel="stylesheet" href="{% static 'partout/css/add_car_form.css' %}">
{% endblock sub_css %}

{% block content %}
<div class="profilePage">
    <section class="widget">
        <h2>Add a car to your garage</h2>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Save car</button>
            <a href="{% url 'show_profile' request.user.driver.pk %}">Cancel</a>
        </form>
    </section>
</div>


{% endblock content %}
