<!-- partout/templates/partout/create_offer_form.html -->

{% extends 'partout/base.html' %}
{% load static %}

{% block sub_css %}
<link rel="stylesheet" href="{% static 'partout/css/add_car_form.css' %}">
{% endblock sub_css %}

{% block content %}
<div class="profilePage">
    <section class="widget">
        <h2>Make Offer</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Rate!</button>
            <a href="{% url 'show_profile' rating_receiver.pk %}">Cancel</a>
            
        </form>
    </section>
</div>


{% endblock content %}
