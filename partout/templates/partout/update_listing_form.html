{% extends 'partout/base.html' %}
{% load static %}

{% block sub_css %}
<link rel="stylesheet" href="{% static 'partout/css/update_listing_form.css' %}">
{% endblock sub_css %}

{% block content %}

<h1 class="title">Update Listing</h1>
<div class="container">
    <form action="{% url 'update_listing' listing.pk %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <table class="form-box">
            <tr>
                {{form.as_table}}
            </tr>
        </table>
        
        <div class="button-box">
            <input type="submit" name="submit" class="submit-button">
            <a href="{% url 'market' %}" class="cancel-button">cancel</a>
        </div>
    </form>
</div>


{% endblock %}
